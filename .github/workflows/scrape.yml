name: Daily TCGPlayer Presale Scrape

on:
  schedule:
    - cron: "0 9 * * *"   # 9:00 AM UTC daily (5 AM ET / 2 AM PT)
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write           # needed to commit results.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python tcgplayer_presale.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json
          git diff --cached --quiet || git commit -m "chore: update presale listings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
